<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LiftLog</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#22c55e',
                            dark: '#16a34a',
                            light: '#4ade80'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pr-badge { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div id="app"></div>

    <script>
        const API = '/api';
        let token = localStorage.getItem('liftlog_token');
        let currentUser = null;
        let currentWorkout = null;
        let exercises = [];
        
        // ============ ROUTING ============
        function navigate(page, params = {}) {
            window.history.pushState({page, params}, '', `#${page}`);
            render(page, params);
        }
        
        window.onpopstate = (e) => {
            if (e.state) render(e.state.page, e.state.params);
            else render('feed');
        };
        
        // ============ API HELPERS ============
        async function api(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            const res = await fetch(`${API}${endpoint}`, { ...options, headers });
            if (res.status === 401) {
                logout();
                throw new Error('Unauthorized');
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Request failed');
            }
            return res.json();
        }
        
        // ============ AUTH ============
        async function login(username, password) {
            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);
            
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            
            if (!res.ok) throw new Error('Invalid credentials');
            const data = await res.json();
            token = data.access_token;
            localStorage.setItem('liftlog_token', token);
            await loadUser();
            navigate('feed');
        }
        
        async function register(username, email, password) {
            const data = await api('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password })
            });
            token = data.access_token;
            localStorage.setItem('liftlog_token', token);
            await loadUser();
            navigate('feed');
        }
        
        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('liftlog_token');
            navigate('login');
        }
        
        async function loadUser() {
            if (!token) return;
            try {
                currentUser = await api('/auth/me');
            } catch (e) {
                logout();
            }
        }
        
        async function loadExercises() {
            exercises = await api('/exercises');
        }
        
        // ============ RENDER ============
        function render(page, params = {}) {
            const app = document.getElementById('app');
            
            if (!token && !['login', 'register'].includes(page)) {
                return navigate('login');
            }
            
            switch(page) {
                case 'login': app.innerHTML = renderLogin(); break;
                case 'register': app.innerHTML = renderRegister(); break;
                case 'feed': app.innerHTML = renderFeed(); loadFeed(); break;
                case 'workout': app.innerHTML = renderWorkout(); break;
                case 'history': app.innerHTML = renderHistory(); loadHistory(); break;
                case 'profile': app.innerHTML = renderProfile(params.userId); loadProfile(params.userId); break;
                case 'prs': app.innerHTML = renderPRs(); loadPRs(); break;
                default: app.innerHTML = renderFeed(); loadFeed();
            }
        }
        
        // ============ AUTH PAGES ============
        function renderLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-sm">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl font-bold text-brand mb-2">💪 LiftLog</h1>
                            <p class="text-slate-400">Track your gains. Share your progress.</p>
                        </div>
                        <form onsubmit="handleLogin(event)" class="space-y-4">
                            <input type="text" id="loginUser" placeholder="Username" required
                                class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-brand">
                            <input type="password" id="loginPass" placeholder="Password" required
                                class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-brand">
                            <button type="submit" class="w-full py-3 bg-brand hover:bg-brand-dark rounded-xl font-semibold transition">
                                Sign In
                            </button>
                        </form>
                        <p class="text-center mt-6 text-slate-400">
                            No account? <a href="#register" onclick="navigate('register')" class="text-brand">Sign up</a>
                        </p>
                        <div id="loginError" class="mt-4 text-red-400 text-center hidden"></div>
                    </div>
                </div>
            `;
        }
        
        function renderRegister() {
            return `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-sm">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl font-bold text-brand mb-2">💪 LiftLog</h1>
                            <p class="text-slate-400">Start tracking your progress</p>
                        </div>
                        <form onsubmit="handleRegister(event)" class="space-y-4">
                            <input type="text" id="regUser" placeholder="Username" required
                                class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-brand">
                            <input type="email" id="regEmail" placeholder="Email" required
                                class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-brand">
                            <input type="password" id="regPass" placeholder="Password" required minlength="6"
                                class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-brand">
                            <button type="submit" class="w-full py-3 bg-brand hover:bg-brand-dark rounded-xl font-semibold transition">
                                Create Account
                            </button>
                        </form>
                        <p class="text-center mt-6 text-slate-400">
                            Have an account? <a href="#login" onclick="navigate('login')" class="text-brand">Sign in</a>
                        </p>
                        <div id="regError" class="mt-4 text-red-400 text-center hidden"></div>
                    </div>
                </div>
            `;
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            try {
                await login(document.getElementById('loginUser').value, document.getElementById('loginPass').value);
            } catch (err) {
                document.getElementById('loginError').textContent = err.message;
                document.getElementById('loginError').classList.remove('hidden');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            try {
                await register(
                    document.getElementById('regUser').value,
                    document.getElementById('regEmail').value,
                    document.getElementById('regPass').value
                );
            } catch (err) {
                document.getElementById('regError').textContent = err.message;
                document.getElementById('regError').classList.remove('hidden');
            }
        }
        
        // ============ NAV BAR ============
        function renderNavBar(active) {
            return `
                <nav class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 px-6 py-3 flex justify-around items-center z-50">
                    <button onclick="navigate('feed')" class="flex flex-col items-center ${active === 'feed' ? 'text-brand' : 'text-slate-400'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        <span class="text-xs mt-1">Feed</span>
                    </button>
                    <button onclick="navigate('history')" class="flex flex-col items-center ${active === 'history' ? 'text-brand' : 'text-slate-400'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span class="text-xs mt-1">History</span>
                    </button>
                    <button onclick="startWorkout()" class="bg-brand w-14 h-14 rounded-full flex items-center justify-center -mt-6 shadow-lg">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                    <button onclick="navigate('prs')" class="flex flex-col items-center ${active === 'prs' ? 'text-brand' : 'text-slate-400'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                        <span class="text-xs mt-1">PRs</span>
                    </button>
                    <button onclick="navigate('profile', {userId: ${currentUser?.id}})" class="flex flex-col items-center ${active === 'profile' ? 'text-brand' : 'text-slate-400'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        <span class="text-xs mt-1">Profile</span>
                    </button>
                </nav>
            `;
        }
        
        // ============ FEED ============
        function renderFeed() {
            return `
                <div class="pb-24">
                    <header class="sticky top-0 bg-slate-900/95 backdrop-blur px-6 py-4 border-b border-slate-800">
                        <h1 class="text-2xl font-bold">💪 LiftLog</h1>
                    </header>
                    <div id="feedContent" class="p-4 space-y-4">
                        <div class="text-center py-12 text-slate-400">Loading...</div>
                    </div>
                </div>
                ${renderNavBar('feed')}
            `;
        }
        
        async function loadFeed() {
            try {
                const feed = await api('/feed');
                const container = document.getElementById('feedContent');
                
                if (feed.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12">
                            <p class="text-slate-400 mb-4">No workouts yet</p>
                            <button onclick="startWorkout()" class="px-6 py-3 bg-brand rounded-xl font-semibold">
                                Start Your First Workout
                            </button>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = feed.map(w => renderWorkoutCard(w)).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        function renderWorkoutCard(w) {
            const duration = w.duration_minutes ? `${w.duration_minutes} min` : '';
            const prCount = w.sets?.filter(s => s.is_pr).length || 0;
            
            // Group sets by exercise
            const exerciseGroups = {};
            (w.sets || []).forEach(s => {
                if (!exerciseGroups[s.exercise_name]) exerciseGroups[s.exercise_name] = [];
                exerciseGroups[s.exercise_name].push(s);
            });
            
            const exerciseSummary = Object.entries(exerciseGroups).map(([name, sets]) => {
                const maxWeight = Math.max(...sets.map(s => s.weight || 0));
                return `<span class="text-slate-300">${name}</span> <span class="text-brand">${maxWeight}lbs</span>`;
            }).join(' · ');
            
            return `
                <div class="bg-slate-800 rounded-2xl p-4" onclick="viewWorkout(${w.id})">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center text-lg">
                            ${w.avatar_url ? `<img src="${w.avatar_url}" class="w-full h-full rounded-full">` : w.display_name?.[0]?.toUpperCase() || '👤'}
                        </div>
                        <div class="flex-1">
                            <p class="font-semibold">${w.display_name || w.username}</p>
                            <p class="text-xs text-slate-400">${formatDate(w.started_at)} · ${duration}</p>
                        </div>
                        ${prCount > 0 ? `<span class="pr-badge bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded-full text-xs font-semibold">🏆 ${prCount} PR${prCount > 1 ? 's' : ''}</span>` : ''}
                    </div>
                    <h3 class="font-semibold text-lg mb-2">${w.title || 'Workout'}</h3>
                    <p class="text-sm text-slate-400 mb-3">${exerciseSummary}</p>
                    <div class="flex items-center gap-4 text-sm text-slate-400">
                        <button onclick="event.stopPropagation(); likeWorkout(${w.id}, this)" class="flex items-center gap-1 ${w.is_liked ? 'text-red-400' : ''}">
                            ${w.is_liked ? '❤️' : '🤍'} <span>${w.like_count}</span>
                        </button>
                        <span>💬 ${w.comment_count || 0}</span>
                    </div>
                </div>
            `;
        }
        
        async function likeWorkout(id, btn) {
            try {
                const res = await api(`/workouts/${id}/like`, { method: 'POST' });
                btn.innerHTML = `${res.liked ? '❤️' : '🤍'} <span>${res.like_count}</span>`;
                btn.className = `flex items-center gap-1 ${res.liked ? 'text-red-400' : ''}`;
            } catch (e) {
                console.error(e);
            }
        }
        
        // ============ WORKOUT SESSION ============
        function renderWorkout() {
            return `
                <div class="min-h-screen flex flex-col">
                    <header class="sticky top-0 bg-slate-900 px-4 py-4 flex items-center justify-between border-b border-slate-800">
                        <button onclick="cancelWorkout()" class="text-slate-400">Cancel</button>
                        <div class="text-center">
                            <p class="font-semibold">Workout</p>
                            <p id="workoutTimer" class="text-sm text-brand">00:00</p>
                        </div>
                        <button onclick="finishWorkout()" class="text-brand font-semibold">Finish</button>
                    </header>
                    
                    <div class="flex-1 p-4 pb-32 overflow-y-auto hide-scrollbar">
                        <div id="workoutSets" class="space-y-4 mb-6"></div>
                        
                        <button onclick="showExerciseModal()" class="w-full py-4 border-2 border-dashed border-slate-700 rounded-xl text-slate-400 hover:border-brand hover:text-brand transition">
                            + Add Exercise
                        </button>
                    </div>
                </div>
                
                <!-- Exercise Modal -->
                <div id="exerciseModal" class="fixed inset-0 bg-black/80 z-50 hidden">
                    <div class="absolute bottom-0 left-0 right-0 bg-slate-800 rounded-t-3xl max-h-[80vh] flex flex-col">
                        <div class="p-4 border-b border-slate-700">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-lg font-semibold">Add Exercise</h3>
                                <button onclick="hideExerciseModal()" class="text-slate-400">✕</button>
                            </div>
                            <input type="text" id="exerciseSearch" placeholder="Search exercises..." oninput="filterExercises(this.value)"
                                class="w-full px-4 py-3 bg-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand">
                        </div>
                        <div id="exerciseList" class="flex-1 overflow-y-auto p-4"></div>
                    </div>
                </div>
            `;
        }
        
        async function startWorkout() {
            try {
                await loadExercises();
                const res = await api('/workouts', { method: 'POST', body: JSON.stringify({}) });
                currentWorkout = { id: res.id, startedAt: new Date(res.started_at), sets: [], exercises: {} };
                navigate('workout');
                startTimer();
            } catch (e) {
                alert('Failed to start workout');
            }
        }
        
        let timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - currentWorkout.startedAt) / 1000);
                const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const secs = (elapsed % 60).toString().padStart(2, '0');
                const timerEl = document.getElementById('workoutTimer');
                if (timerEl) timerEl.textContent = `${mins}:${secs}`;
            }, 1000);
        }
        
        function cancelWorkout() {
            if (confirm('Discard this workout?')) {
                clearInterval(timerInterval);
                currentWorkout = null;
                navigate('feed');
            }
        }
        
        async function finishWorkout() {
            if (!currentWorkout || currentWorkout.sets.length === 0) {
                alert('Add at least one set');
                return;
            }
            
            try {
                await api(`/workouts/${currentWorkout.id}/finish`, { method: 'PUT' });
                clearInterval(timerInterval);
                currentWorkout = null;
                navigate('feed');
            } catch (e) {
                alert('Failed to save workout');
            }
        }
        
        function showExerciseModal() {
            document.getElementById('exerciseModal').classList.remove('hidden');
            document.getElementById('exerciseSearch').focus();
            filterExercises('');
        }
        
        function hideExerciseModal() {
            document.getElementById('exerciseModal').classList.add('hidden');
        }
        
        function filterExercises(query) {
            const filtered = exercises.filter(e => 
                e.name.toLowerCase().includes(query.toLowerCase()) ||
                (e.category && e.category.toLowerCase().includes(query.toLowerCase()))
            );
            
            const grouped = {};
            filtered.forEach(e => {
                const cat = e.category || 'Other';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(e);
            });
            
            document.getElementById('exerciseList').innerHTML = Object.entries(grouped).map(([cat, exs]) => `
                <div class="mb-4">
                    <p class="text-xs uppercase text-slate-400 mb-2">${cat}</p>
                    ${exs.map(e => `
                        <button onclick="addExercise(${e.id}, '${e.name}')" class="w-full text-left px-4 py-3 hover:bg-slate-700 rounded-xl transition">
                            ${e.name}
                        </button>
                    `).join('')}
                </div>
            `).join('');
        }
        
        function addExercise(id, name) {
            hideExerciseModal();
            
            if (!currentWorkout.exercises[id]) {
                currentWorkout.exercises[id] = { name, sets: [] };
            }
            
            renderWorkoutSets();
            
            // Auto-add first set
            addSet(id);
        }
        
        function renderWorkoutSets() {
            const container = document.getElementById('workoutSets');
            
            container.innerHTML = Object.entries(currentWorkout.exercises).map(([exId, ex]) => `
                <div class="bg-slate-800 rounded-2xl p-4">
                    <h3 class="font-semibold text-lg mb-4">${ex.name}</h3>
                    <div class="space-y-2 mb-4">
                        <div class="grid grid-cols-12 gap-2 text-xs text-slate-400 px-2">
                            <div class="col-span-2">SET</div>
                            <div class="col-span-4">LBS</div>
                            <div class="col-span-4">REPS</div>
                            <div class="col-span-2"></div>
                        </div>
                        ${ex.sets.map((s, i) => `
                            <div class="grid grid-cols-12 gap-2 items-center ${s.saved ? 'opacity-60' : ''}">
                                <div class="col-span-2 text-center font-semibold ${s.is_pr ? 'text-yellow-400' : ''}">${s.is_pr ? '🏆' : i + 1}</div>
                                <input type="number" value="${s.weight || ''}" placeholder="0" ${s.saved ? 'disabled' : ''}
                                    onchange="updateSet(${exId}, ${i}, 'weight', this.value)"
                                    class="col-span-4 bg-slate-700 rounded-lg px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-brand">
                                <input type="number" value="${s.reps || ''}" placeholder="0" ${s.saved ? 'disabled' : ''}
                                    onchange="updateSet(${exId}, ${i}, 'reps', this.value)"
                                    class="col-span-4 bg-slate-700 rounded-lg px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-brand">
                                <button onclick="${s.saved ? '' : `saveSet(${exId}, ${i})`}" 
                                    class="col-span-2 py-2 rounded-lg ${s.saved ? 'bg-brand/20 text-brand' : 'bg-brand text-white'} font-semibold">
                                    ${s.saved ? '✓' : '→'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="addSet(${exId})" class="w-full py-2 text-brand text-sm font-semibold">
                        + Add Set
                    </button>
                </div>
            `).join('');
        }
        
        function addSet(exerciseId) {
            currentWorkout.exercises[exerciseId].sets.push({ weight: null, reps: null, saved: false });
            renderWorkoutSets();
        }
        
        function updateSet(exerciseId, setIndex, field, value) {
            currentWorkout.exercises[exerciseId].sets[setIndex][field] = parseFloat(value) || null;
        }
        
        async function saveSet(exerciseId, setIndex) {
            const ex = currentWorkout.exercises[exerciseId];
            const set = ex.sets[setIndex];
            
            if (!set.weight || !set.reps) {
                alert('Enter weight and reps');
                return;
            }
            
            try {
                const res = await api(`/workouts/${currentWorkout.id}/sets`, {
                    method: 'POST',
                    body: JSON.stringify({
                        exercise_id: parseInt(exerciseId),
                        set_number: setIndex + 1,
                        weight: set.weight,
                        reps: set.reps,
                        weight_unit: 'lbs'
                    })
                });
                
                set.saved = true;
                set.is_pr = res.is_pr;
                currentWorkout.sets.push(set);
                
                renderWorkoutSets();
                
                if (res.is_pr) {
                    showPRCelebration(ex.name, set.weight);
                }
            } catch (e) {
                alert('Failed to save set');
            }
        }
        
        function showPRCelebration(exercise, weight) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-3 rounded-full font-bold text-lg animate-bounce z-50';
            toast.innerHTML = `🏆 NEW PR! ${exercise} @ ${weight}lbs`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ============ HISTORY ============
        function renderHistory() {
            return `
                <div class="pb-24">
                    <header class="sticky top-0 bg-slate-900/95 backdrop-blur px-6 py-4 border-b border-slate-800">
                        <h1 class="text-xl font-bold">Workout History</h1>
                    </header>
                    <div id="historyContent" class="p-4 space-y-4">
                        <div class="text-center py-12 text-slate-400">Loading...</div>
                    </div>
                </div>
                ${renderNavBar('history')}
            `;
        }
        
        async function loadHistory() {
            try {
                const workouts = await api('/workouts');
                const container = document.getElementById('historyContent');
                
                if (workouts.length === 0) {
                    container.innerHTML = '<div class="text-center py-12 text-slate-400">No workouts yet</div>';
                    return;
                }
                
                container.innerHTML = workouts.map(w => {
                    const prCount = w.sets?.filter(s => s.is_pr).length || 0;
                    return `
                        <div class="bg-slate-800 rounded-xl p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="font-semibold">${w.title || 'Workout'}</h3>
                                    <p class="text-sm text-slate-400">${formatDate(w.started_at)} · ${w.duration_minutes || 0} min</p>
                                </div>
                                ${prCount > 0 ? `<span class="text-yellow-400 text-sm">🏆 ${prCount}</span>` : ''}
                            </div>
                            <p class="text-sm text-slate-400">${w.sets?.length || 0} sets</p>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        // ============ PRs ============
        function renderPRs() {
            return `
                <div class="pb-24">
                    <header class="sticky top-0 bg-slate-900/95 backdrop-blur px-6 py-4 border-b border-slate-800">
                        <h1 class="text-xl font-bold">🏆 Personal Records</h1>
                    </header>
                    <div id="prsContent" class="p-4 space-y-3">
                        <div class="text-center py-12 text-slate-400">Loading...</div>
                    </div>
                </div>
                ${renderNavBar('prs')}
            `;
        }
        
        async function loadPRs() {
            try {
                const prs = await api('/stats/prs');
                const container = document.getElementById('prsContent');
                
                if (prs.length === 0) {
                    container.innerHTML = '<div class="text-center py-12 text-slate-400">No PRs yet. Start lifting!</div>';
                    return;
                }
                
                container.innerHTML = prs.map(pr => `
                    <div class="bg-slate-800 rounded-xl p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold">${pr.exercise_name}</h3>
                            <p class="text-sm text-slate-400">${formatDate(pr.max_weight_date)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-bold text-brand">${pr.max_weight}<span class="text-sm text-slate-400">lbs</span></p>
                            ${pr.estimated_1rm ? `<p class="text-xs text-slate-400">E1RM: ${pr.estimated_1rm}lbs</p>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }
        
        // ============ PROFILE ============
        function renderProfile(userId) {
            return `
                <div class="pb-24">
                    <header class="sticky top-0 bg-slate-900/95 backdrop-blur px-6 py-4 border-b border-slate-800 flex justify-between items-center">
                        <h1 class="text-xl font-bold">Profile</h1>
                        <button onclick="logout()" class="text-slate-400 text-sm">Sign Out</button>
                    </header>
                    <div id="profileContent" class="p-4">
                        <div class="text-center py-12 text-slate-400">Loading...</div>
                    </div>
                </div>
                ${renderNavBar('profile')}
            `;
        }
        
        async function loadProfile(userId) {
            try {
                const user = await api(`/users/${userId || currentUser.id}`);
                const container = document.getElementById('profileContent');
                
                container.innerHTML = `
                    <div class="text-center mb-6">
                        <div class="w-24 h-24 bg-slate-700 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl">
                            ${user.avatar_url ? `<img src="${user.avatar_url}" class="w-full h-full rounded-full">` : user.display_name?.[0]?.toUpperCase() || '👤'}
                        </div>
                        <h2 class="text-2xl font-bold">${user.display_name || user.username}</h2>
                        <p class="text-slate-400">@${user.username}</p>
                        ${user.bio ? `<p class="mt-2 text-slate-300">${user.bio}</p>` : ''}
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-slate-800 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold">${user.workout_count}</p>
                            <p class="text-xs text-slate-400">Workouts</p>
                        </div>
                        <div class="bg-slate-800 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold">${user.follower_count}</p>
                            <p class="text-xs text-slate-400">Followers</p>
                        </div>
                        <div class="bg-slate-800 rounded-xl p-4 text-center">
                            <p class="text-2xl font-bold">${user.following_count}</p>
                            <p class="text-xs text-slate-400">Following</p>
                        </div>
                    </div>
                    
                    ${!user.is_me ? `
                        <button onclick="toggleFollow(${user.id}, this)" class="w-full py-3 rounded-xl font-semibold ${user.is_following ? 'bg-slate-700' : 'bg-brand'}">
                            ${user.is_following ? 'Following' : 'Follow'}
                        </button>
                    ` : ''}
                `;
            } catch (e) {
                console.error(e);
            }
        }
        
        async function toggleFollow(userId, btn) {
            try {
                const res = await api(`/users/${userId}/follow`, { method: 'POST' });
                btn.textContent = res.following ? 'Following' : 'Follow';
                btn.className = `w-full py-3 rounded-xl font-semibold ${res.following ? 'bg-slate-700' : 'bg-brand'}`;
            } catch (e) {
                console.error(e);
            }
        }
        
        // ============ UTILS ============
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        }
        
        // ============ INIT ============
        async function init() {
            if (token) {
                await loadUser();
                if (currentUser) {
                    await loadExercises();
                    const hash = window.location.hash.slice(1) || 'feed';
                    navigate(hash);
                } else {
                    navigate('login');
                }
            } else {
                navigate('login');
            }
        }
        
        init();
    </script>
</body>
</html>
